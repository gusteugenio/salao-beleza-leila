<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex-shrink-0 flex items-center gap-3">
        <a routerLink="/" class="flex items-center gap-3">
          <img src="/images/barbie-logo.png" alt="Cabeleila Leila" class="h-10 w-10">
          <span class="text-2xl font-bold" style="color: var(--primary-color)">
            Cabeleila Leila
          </span>
        </a>
      </div>

      <div class="flex items-center space-x-8">
        <ng-container *ngIf="!isAuthenticated">
          <a routerLink="/auth/login" routerLinkActive="text-pink-600" class="text-gray-700 hover:text-pink-600 transition font-medium">
            Entrar
          </a>
          <a routerLink="/auth/register" class="px-6 py-2 text-white rounded-lg hover:shadow-lg transition font-medium" style="background-color: var(--primary-color)">
            Cadastrar
          </a>
        </ng-container>

        <ng-container *ngIf="isAuthenticated && !isAdmin">
          <a routerLink="/client/home" routerLinkActive="text-pink-600" class="text-gray-700 hover:text-pink-600 transition font-medium">
            Agendar
          </a>
          <a routerLink="/client/appointments" routerLinkActive="text-pink-600" class="text-gray-700 hover:text-pink-600 transition font-medium">
            Meus Agendamentos
          </a>
          <div class="relative group">
            <button class="flex items-center space-x-2 text-gray-700 hover:text-pink-600 transition font-medium">
              <span>👤 {{ userName }}</span>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
              </svg>
            </button>
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition">
              <button (click)="logout()" class="block w-full text-left px-4 py-2 text-gray-700 hover:text-pink-600 hover:bg-pink-50 transition">
                Sair
              </button>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="isAuthenticated && isAdmin">
          <a routerLink="/admin/dashboard" routerLinkActive="text-pink-600" class="text-gray-700 hover:text-pink-600 transition font-medium">
            Dashboard
          </a>
          <a routerLink="/admin/appointments" routerLinkActive="text-pink-600" class="text-gray-700 hover:text-pink-600 transition font-medium">
            Agendamentos
          </a>
          <div class="relative group">
            <button class="flex items-center space-x-2 text-gray-700 hover:text-pink-600 transition font-medium">
              <span>⚙️ {{ userName }}</span>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
              </svg>
            </button>
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition">
              <button (click)="logout()" class="block w-full text-left px-4 py-2 text-gray-700 hover:text-pink-600 hover:bg-pink-50 transition">
                Sair
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
