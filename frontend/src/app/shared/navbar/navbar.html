<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex-shrink-0 flex items-center gap-3">
        <a routerLink="/" class="flex items-center gap-3">
          <img src="/images/barbie-logo.png" alt="Cabeleila Leila" class="h-10 w-10">
          <span class="text-2xl font-bold" style="color: var(--primary-color)">
            Cabeleila Leila
          </span>
        </a>
      </div>

      <div class="flex items-center space-x-8">
        <ng-container *ngIf="!isAuthenticated">
          <a routerLink="/auth/login" class="transition font-medium" style="color: #4b5563" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='#4b5563'">
            Entrar
          </a>
          <a routerLink="/auth/register" class="px-6 py-2 text-white rounded-lg hover:shadow-lg transition font-medium" style="background-color: var(--primary-color)">
            Cadastrar
          </a>
        </ng-container>

        <ng-container *ngIf="isAuthenticated && !isAdmin">
          <a routerLink="/client/home" class="transition font-medium" style="color: #4b5563" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='#4b5563'">
            Agendar
          </a>
          <a routerLink="/client/appointments" class="transition font-medium" style="color: #4b5563" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='#4b5563'">
            Meus Agendamentos
          </a>
          <div class="profile-dropdown">
            <button class="flex items-center font-medium dropdown-trigger" style="gap: 0.25rem">
              <svg class="w-5 h-5 dropdown-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              <span class="user-name">{{ userName }}</span>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" style="margin-left: 0.25rem; transition: all 0.3s ease">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" stroke="currentColor" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
              </svg>
            </button>
            <div class="dropdown-menu">
              <button (click)="logout()" class="dropdown-item">
                Sair
              </button>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="isAuthenticated && isAdmin">
          <a routerLink="/admin/dashboard" class="transition font-medium" style="color: #4b5563" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='#4b5563'">
            Dashboard
          </a>
          <a routerLink="/admin/appointments" class="transition font-medium" style="color: #4b5563" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='#4b5563'">
            Agendamentos
          </a>
          <div class="profile-dropdown">
            <button class="flex items-center font-medium dropdown-trigger" style="gap: 0.25rem">
              <svg class="w-5 h-5 dropdown-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              <span class="user-name">{{ userName }}</span>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" style="margin-left: 0.25rem; transition: all 0.3s ease">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" stroke="currentColor" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
              </svg>
            </button>
            <div class="dropdown-menu">
              <button (click)="logout()" class="dropdown-item">
                Sair
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
