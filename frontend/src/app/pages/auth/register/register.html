<div class="register-container">
  <div class="register-card">
    <h1>Cadastro</h1>
    <p class="subtitle">Crie sua conta para agendar</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="name">Nome</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Seu nome"
          class="form-input"
        />
        <span class="error-text" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          Mínimo 3 caracteres
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          class="form-input"
        />
        <span class="error-text" *ngIf="form.get('email')?.hasError('backend')">
          {{ form.get('email')?.getError('backend') }}
        </span>
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched && !form.get('email')?.hasError('backend')">
          Email inválido
        </span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Sua senha"
          class="form-input"
        />
        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </span>
      </div>

      <span class="error-text" *ngIf="error" class="general-error">
        {{ error }}
      </span>

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="submit-button"
      >
        {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
      </button>
    </form>

    <p class="login-link">
      Já tem conta?
      <a routerLink="/auth/login">Entre aqui</a>
    </p>
  </div>
</div>
