<div class="login-container">
  <div class="login-card">
    <h1>Entrar</h1>
    <p class="subtitle">Bem-vinda ao Cabeleila Leila</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          class="form-input"
        />
        <span class="error-text" *ngIf="form.get('email')?.hasError('backend')">
          {{ form.get('email')?.getError('backend') }}
        </span>
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched && !form.get('email')?.hasError('backend')">
          Email inválido
        </span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Sua senha"
          class="form-input"
        />
        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </span>
      </div>

      <span class="error-text" *ngIf="error" class="general-error">
        {{ error }}
      </span>

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="submit-button"
      >
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="register-link">
      Não tem conta?
      <a routerLink="/auth/register">Cadastre-se aqui</a>
    </p>
  </div>
</div>
